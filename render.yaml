services:
  - type: web
    name: ai-calendar-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: REDIRECT_URI
        sync: false           # Set to: https://YOUR-APP.onrender.com/auth/callback
      - key: GEMINI_API_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: APP_URL
        sync: false           # Set to: https://YOUR-APP.onrender.com
      - key: SESSION_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-calendar-db
          property: connectionString

databases:
  - name: ai-calendar-db
    plan: free
